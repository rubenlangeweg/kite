name: Kite
options:
  bundleIdPrefix: nl.rb2
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_ENABLE_MODULES: YES
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  Kite:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    resources: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.rb2.kite
        PRODUCT_NAME: Kite
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Kite.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    scheme:
      testTargets:
        - KiteTests
        - KiteUITests
      gatherCoverageData: false

  KiteTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/KiteTests
    dependencies:
      - target: Kite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.rb2.kite.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kite.app/Contents/MacOS/Kite"

  KiteUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/KiteUITests
    dependencies:
      - target: Kite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.rb2.kite.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Kite

# NOTE: pointfreeco/swift-snapshot-testing is intentionally NOT added here.
# It will be attached to KiteTests (or a dedicated ViewTests target) by the
# first feature that actually uses snapshot tests (see M2-repo-sidebar and
# later). Deferring avoids a Package.resolved commit that isn't used yet.

included:
  - Sources
  - Tests

excluded:
  - .build
  - build
  - DerivedData
  - .swiftpm
  - Kite.xcodeproj

disabled_rules:
  - trailing_comma
  - todo
  - opening_brace

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 120

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - to
    - x
    - y
